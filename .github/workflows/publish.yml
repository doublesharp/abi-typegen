name: Publish

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish abi-typegen-core
        run: cargo publish -p abi-typegen-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish abi-typegen-config
        run: cargo publish -p abi-typegen-config --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish abi-typegen-codegen
        run: cargo publish -p abi-typegen-codegen --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish abi-typegen
        run: cargo publish -p abi-typegen --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Binary package first (hardhat plugin depends on it)
      - name: Publish @0xdoublesharp/abi-typegen
        run: cd npm/abi-typegen && npm publish --access public

      - name: Publish @0xdoublesharp/hardhat-abi-typegen
        run: cd npm/hardhat-abi-typegen && npm publish --access public
